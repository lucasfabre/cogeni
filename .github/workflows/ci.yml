name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          output_name="cogeni"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            output_name="cogeni.exe"
          fi
          go build -trimpath -buildvcs=false -o "$output_name" ./src

      - name: Run Go tests
        run: go test ./...

      - name: Run shell and Lua integration tests
        run: ./tests/shell/framework/run_all_tests.sh

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/docusaurus/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build docs
        run: |
          go build -trimpath -buildvcs=false -o cogeni ./src
          ./cogeni doc
          (cd examples/fullstack && ../../cogeni run cogeni.lua)
          python3 ./scripts/build_man_pages_md.py
          ./scripts/build_api_docs_md.sh
          ./scripts/build_site.sh

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: dist/docs
          if-no-files-found: error
