name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          output_name="cogeni"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            output_name="cogeni.exe"
          fi
          go build -trimpath -buildvcs=false -o "$output_name" ./src

      - name: Run Go tests
        run: go test ./...

      - name: Run shell and Lua integration tests
        run: ./tests/shell/framework/run_all_tests.sh
