name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            binary_name: cogeni
            archive_name: cogeni-linux-amd64.tar.gz
          - os: macos-13
            label: darwin-amd64
            binary_name: cogeni
            archive_name: cogeni-darwin-amd64.tar.gz
          - os: macos-latest
            label: darwin-arm64
            binary_name: cogeni
            archive_name: cogeni-darwin-arm64.tar.gz
          - os: windows-latest
            label: windows-amd64
            binary_name: cogeni.exe
            archive_name: cogeni-windows-amd64.zip
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: go build -trimpath -buildvcs=false -ldflags="-s -w -buildid=" -o "${{ matrix.binary_name }}" ./src

      - name: Package tarball
        if: runner.os != 'Windows'
        run: tar -czf "${{ matrix.archive_name }}" "${{ matrix.binary_name }}"

      - name: Package zip
        if: runner.os == 'Windows'
        run: powershell -Command "Compress-Archive -Path '${{ matrix.binary_name }}' -DestinationPath '${{ matrix.archive_name }}'"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.archive_name }}
          if-no-files-found: error

  docs:
    name: Build docs artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/docusaurus/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build docs
        run: |
          go build -trimpath -buildvcs=false -o cogeni ./src
          ./cogeni doc
          (cd examples/fullstack && ../../cogeni run cogeni.lua)
          python3 ./scripts/build_man_pages_md.py
          ./scripts/build_api_docs_md.sh
          ./scripts/build_site.sh
          tar -czf cogeni-docs.tar.gz -C dist docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: cogeni-docs.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - build
      - docs
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*/*
          generate_release_notes: true
